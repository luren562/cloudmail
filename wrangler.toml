name = "cloudmail"
main = "worker/src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = [ "nodejs_compat" ]
keep_vars = true

# 添加构建命令，确保依赖被安装
[build]
command = "cd worker && pnpm install --no-frozen-lockfile"

[vars]
PREFIX = "tmp"
DEFAULT_DOMAINS = ["luren.cfd"]
DOMAINS = ["luren.cfd"]
JWT_SECRET = "luren562CloudMail2026SecretKey"
BLACK_LIST = ""
ENABLE_USER_CREATE_EMAIL = true
ENABLE_USER_DELETE_EMAIL = true
ENABLE_AUTO_REPLY = false
ENABLE_USER_CHANGE_PASSWORD = true
ENABLE_ADDRESS_PASSWORD = false
ADMIN_PASSWORD = "fwHWHg7a45w"  # 添加这行

[[d1_databases]]
binding = "DB"
database_name = "cloudmail-db"
database_id = "e38dbcec-fe5e-4db8-92a1-7999c60f992a"
